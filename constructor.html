<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Конструктор состава</title>
    <!-- Telegram SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <!-- jQuery (необходим для DaData) -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <!-- intl-tel-input для валидации телефона -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/intl-tel-input@18.2.1/build/css/intlTelInput.css">
    <script src="https://cdn.jsdelivr.net/npm/intl-tel-input@18.2.1/build/js/intlTelInput.min.js"></script>
    <!-- DaData Suggestions -->
    <link href="https://cdn.jsdelivr.net/npm/suggestions-jquery@21.12.0/dist/css/suggestions.min.css" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/suggestions-jquery@21.12.0/dist/js/jquery.suggestions.min.js"></script>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <style>
        * { box-sizing: border-box; }
        body { font-family: system-ui, sans-serif; margin: 0; padding: 16px; background: #f0f2f5; }
        .back-button { display: inline-block; margin-bottom: 16px; padding: 8px 16px; background: #ddd; border-radius: 20px; text-decoration: none; color: black; font-weight: 500; cursor: pointer; }
        h2 { margin-top: 0; }
        .field { width: 100%; max-width: 500px; margin: 0 auto 20px; border-radius: 24px; padding: 12px; background: #2e7d32; }
        .positions-grid { width: 100%; display: flex; flex-direction: column; gap: 10px; }
        .line { display: flex; justify-content: center; gap: clamp(4px, 2vw, 12px); flex-wrap: nowrap; }
        .position-wrapper { display: flex; flex-direction: column; align-items: center; width: clamp(60px, 16vw, 90px); }
        .position { min-height: 90px; width: 100%; aspect-ratio: 2 / 3; background: rgba(255,255,255,0.2); border: 2px solid rgba(255,255,255,0.6); border-radius: 8px; position: relative; overflow: hidden; cursor: pointer; }
        .position.filled { border-color: white; }
        .position img { width: 100%; height: 100%; object-fit: cover; position: absolute; top: 0; left: 0; z-index: 1; pointer-events: none; }
        .position .player-name { position: absolute; bottom: 4px; left: 0; right: 0; background: rgba(255,255,255,0.7); padding: 3px; border-radius: 4px; font-weight: bold; font-size: 10px; text-align: center; pointer-events: none; }
        .position-label { margin-top: 4px; font-size: 12px; font-weight: bold; color: #333; text-align: center; }
        .selector-panel { display: none; position: fixed; bottom: 0; left: 0; right: 0; background: white; border-top-left-radius: 20px; border-top-right-radius: 20px; padding: 16px; max-height: 60vh; overflow-y: auto; z-index: 1000; }
        .selector-panel.active { display: block; }
        .selector-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .selector-header h3 { margin: 0; font-size: 1.2rem; }
        .close-button { background: none; border: none; font-size: 24px; cursor: pointer; }
        .players-list { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }
        .player-option { width: 70px; height: 100px; border-radius: 8px; border: 1px solid #ccc; cursor: pointer; position: relative; overflow: hidden; background-color: #f0f0f0; }
        .player-option img { width: 100%; height: 100%; object-fit: cover; position: absolute; top: 0; left: 0; }
        .player-option .player-name { position: absolute; bottom: 4px; left: 0; right: 0; background: rgba(255,255,255,0.7); padding: 3px; border-radius: 4px; font-weight: bold; font-size: 10px; text-align: center; }
        .separator { width: 100%; text-align: center; font-weight: bold; color: #666; margin: 8px 0; }
        .form-container { background: white; border-radius: 20px; padding: 20px; max-width: 400px; margin: 0 auto; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; margin-bottom: 4px; font-weight: bold; }
        .form-group input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 8px; font-size: 16px; }
        .iti { width: 100%; }
        .form-note { font-size: 12px; color: #666; margin-top: 4px; font-style: italic; }
        .error-message { color: #dc3545; font-size: 14px; margin-top: 4px; display: none; }
        .error-message.visible { display: block; }
        .button-group { display: flex; justify-content: center; gap: 10px; margin: 20px auto 0; flex-wrap: wrap; }
        .action-button { padding: 10px 24px; border: none; border-radius: 30px; font-size: 1rem; font-weight: bold; cursor: pointer; box-shadow: 0 2px 6px rgba(0,0,0,0.2); }
        .clear-button { background: #dc3545; color: white; }
        .order-button { background: #28a745; color: white; }
        .secondary-button { background: #6c757d; color: white; }
        .screen { display: none; }
        .screen.active { display: block; }
        .success-message { background: white; border-radius: 20px; padding: 30px; text-align: center; max-width: 400px; margin: 20px auto; }
        #constructorScreen { padding-bottom: 120px; }
    </style>
</head>
<body>
<div id="app">
    <div id="constructorScreen" class="screen active">
        <a href="index.html" class="back-button">← Назад к командам</a>
        <h2 id="team-title">Загрузка...</h2>
        <div class="field"><div class="positions-grid" id="positionsGrid">
            <div class="line"><div class="position-wrapper"><div class="position" data-position="FWD"></div><div class="position-label">LW</div></div><div class="position-wrapper"><div class="position" data-position="FWD"></div><div class="position-label">ST</div></div><div class="position-wrapper"><div class="position" data-position="FWD"></div><div class="position-label">RW</div></div></div>
            <div class="line"><div class="position-wrapper"><div class="position" data-position="MID"></div><div class="position-label">CM</div></div><div class="position-wrapper"><div class="position" data-position="MID"></div><div class="position-label">CM</div></div><div class="position-wrapper"><div class="position" data-position="MID"></div><div class="position-label">CM</div></div></div>
            <div class="line"><div class="position-wrapper"><div class="position" data-position="DEF"></div><div class="position-label">LB</div></div><div class="position-wrapper"><div class="position" data-position="DEF"></div><div class="position-label">CB</div></div><div class="position-wrapper"><div class="position" data-position="DEF"></div><div class="position-label">CB</div></div><div class="position-wrapper"><div class="position" data-position="DEF"></div><div class="position-label">RB</div></div></div>
            <div class="line"><div class="position-wrapper"><div class="position" data-position="GK"></div><div class="position-label">GK</div></div></div>
        </div></div>
        <div class="selector-panel" id="selectorPanel"><div class="selector-header"><h3 id="selectorTitle">Выберите игрока</h3><button class="close-button" id="closeSelector">&times;</button></div><div class="players-list" id="playersList"></div></div>
        <div class="button-group"><button class="action-button clear-button" id="clearButton">Очистить состав</button><button class="action-button order-button" id="orderButton" style="display: none;">Подтвердить</button></div>
    </div>
    <div id="formScreen" class="screen">
        <button class="back-button" id="backToConstructor">← Назад к составу</button><h2>Контактные данные</h2>
        <div class="form-container">
            <div class="form-group"><label for="surname">Фамилия</label><input type="text" id="surname" placeholder="Иванов"><div id="surnameError" class="error-message">Введите фамилию</div></div>
            <div class="form-group"><label for="name">Имя</label><input type="text" id="name" placeholder="Иван"><div id="nameError" class="error-message">Введите имя</div></div>
            <div class="form-group"><label for="patronymic">Отчество</label><input type="text" id="patronymic" placeholder="Иванович"><div id="patronymicError" class="error-message"></div></div>
            <div class="form-group"><label for="phone">Номер телефона</label><input type="tel" id="phone" placeholder="+7 (999) 123-45-67"><div id="phoneError" class="error-message">Неверный номер телефона</div></div>
            <div class="form-group"><label for="address">Адрес ПВЗ СДЕК</label><input type="text" id="address" placeholder="Начните вводить адрес..."><div class="form-note">*При отсутствии ПВЗ — ближайший</div><div id="addressError" class="error-message">Введите корректный адрес</div></div>
            <div class="button-group"><button class="action-button secondary-button" id="backFromForm">Назад</button><button class="action-button order-button" id="nextToConfirm">Далее</button></div>
        </div>
    </div>
    <div id="reviewScreen" class="screen">
        <button class="back-button" id="backToFormFromReview">← Назад</button>
        <div class="form-container"><h2>Проверьте заказ</h2><div id="reviewContent"></div><div class="button-group"><button class="action-button secondary-button" id="editOrder">Редактировать</button><button class="action-button order-button" id="confirmOrder">Подтвердить и оплатить</button></div></div>
    </div>
    <div id="confirmScreen" class="screen"><div class="success-message"><h2>Заказ успешно оформлен!</h2><p>Спасибо, ваш заказ принят.</p><button class="action-button order-button" id="finishButton">Готово</button></div></div>
</div>

<script src="https://integrationjs.t-static.ru/integration.js" async></script>

<script>
    let paymentIntegrationGlobal = null;

    function initTBank() {
        if (!window.PaymentIntegration) {
            setTimeout(initTBank, 200);
            return;
        }
        PaymentIntegration.init({
            terminalKey: '1775395377330DEMO',
            product: 'eacq',
            features: { payment: {}, iframe: {} }
        }).then(integration => {
            paymentIntegrationGlobal = integration;
            console.log('✅ T-Bank оплата готова');
        }).catch(err => console.error('❌ Ошибка:', err));
    }
    window.addEventListener('load', initTBank);

    (function() {
        if (window.Telegram && Telegram.WebApp) Telegram.WebApp.ready();
        
        let team = new URLSearchParams(location.search).get('team') || 'Барселона';
        document.getElementById('team-title').textContent = `Состав ${team}`;
        
        let playersData = [];
        const fieldPositions = new Map();
        let customerData = { surname: '', name: '', patronymic: '', phone: '', address: '' };
        let iti = null;
        let currentPositionElement = null;
        let orderSent = false;
        
        // Получаем все элементы
        const constructorScreen = document.getElementById('constructorScreen');
        const formScreen = document.getElementById('formScreen');
        const confirmScreen = document.getElementById('confirmScreen');
        const reviewScreen = document.getElementById('reviewScreen');
        const positions = document.querySelectorAll('.position');
        const positionWrappers = document.querySelectorAll('.position-wrapper');
        const selectorPanel = document.getElementById('selectorPanel');
        const playersList = document.getElementById('playersList');
        const selectorTitle = document.getElementById('selectorTitle');
        const closeSelector = document.getElementById('closeSelector');
        const orderButton = document.getElementById('orderButton');
        const clearButton = document.getElementById('clearButton');
        const backFromForm = document.getElementById('backFromForm');
        const backToConstructor = document.getElementById('backToConstructor');
        const backToForm = document.getElementById('backToForm');
        const finishButton = document.getElementById('finishButton');
        const editOrder = document.getElementById('editOrder');
        const confirmOrder = document.getElementById('confirmOrder');
        const backToFormFromReview = document.getElementById('backToFormFromReview');
        const nextToConfirm = document.getElementById('nextToConfirm');

        function calculateOrderTotal() { return 1990; }

        function sendOrderToBot() {
            if (orderSent) return;
            if (!window.Telegram?.WebApp) { alert("❌ Telegram WebApp недоступен"); return; }
            orderSent = true;
            const tgUser = Telegram.WebApp.initDataUnsafe?.user || null;
            const composition = {
                order_id: customerData.order_id,
                team: team,
                order_date: new Date().toLocaleString('ru-RU'),
                customer: { ...customerData, telegram: tgUser?.username ? '@'+tgUser.username : null, telegram_id: tgUser?.id || null },
                players: []
            };
            positionWrappers.forEach(w => {
                const name = fieldPositions.get(w.querySelector('.position'));
                if (name) composition.players.push({ position: w.querySelector('.position-label').textContent, name: name });
            });
            try {
                Telegram.WebApp.sendData(JSON.stringify(composition));
                console.log('Заказ отправлен');
            } catch(e) { alert('Ошибка: '+e.message); orderSent = false; }
        }

        async function startPayment(amount, orderId) {
            if (!paymentIntegrationGlobal) { alert('Платёжная система загружается, подождите'); return false; }
            try {
                const resp = await fetch('https://securepay.tinkoff.ru/v2/Init', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        TerminalKey: '1775395377330DEMO',
                        Password: '8GpcH_i4V!&j$4nb',
                        Amount: amount * 100,
                        OrderId: orderId.toString(),
                        Description: `Заказ №${orderId}`,
                        Recurrent: 'N',
                        CustomerKey: `user_${customerData.phone || 'anon'}`
                    })
                });
                const result = await resp.json();
                if (!result.Success) throw new Error(result.Message);
                const paymentResult = await paymentIntegrationGlobal.payment({ paymentId: result.PaymentId, frame: true });
                if (paymentResult.success) {
                    sendOrderToBot();
                    return true;
                }
                return false;
            } catch(e) { alert('Ошибка оплаты: '+e.message); return false; }
        }

        function showReviewScreen() {
            let html = `<h3>Команда: ${team}</h3><h4>Клиент:</h4><p>${customerData.surname} ${customerData.name} ${customerData.patronymic}</p><p>${customerData.phone}</p><p>${customerData.address}</p><h4>Состав:</h4><ul>`;
            positionWrappers.forEach(w => {
                const name = fieldPositions.get(w.querySelector('.position'));
                if (name) html += `<li>${w.querySelector('.position-label').textContent}: ${name}</li>`;
            });
            html += `</ul><hr><p><strong>Сумма: 1990 ₽</strong></p>`;
            document.getElementById('reviewContent').innerHTML = html;
            showScreen('review');
        }

        function showScreen(s) {
            if (constructorScreen) constructorScreen.classList.remove('active');
            if (formScreen) formScreen.classList.remove('active');
            if (confirmScreen) confirmScreen.classList.remove('active');
            if (reviewScreen) reviewScreen.classList.remove('active');
            
            if (s === 'constructor' && constructorScreen) constructorScreen.classList.add('active');
            else if (s === 'form' && formScreen) {
                formScreen.classList.add('active');
                document.getElementById('surname').value = customerData.surname;
                document.getElementById('name').value = customerData.name;
                document.getElementById('patronymic').value = customerData.patronymic;
                document.getElementById('phone').value = customerData.phone;
                document.getElementById('address').value = customerData.address;
                if (!iti) {
                    iti = window.intlTelInput(document.querySelector('#phone'), {
                        initialCountry: "ru",
                        separateDialCode: true,
                        utilsScript: "https://cdn.jsdelivr.net/npm/intl-tel-input@18.2.1/build/js/utils.js"
                    });
                }
                if (typeof $.fn.suggestions !== 'undefined' && !$('#address').data('suggestions')) {
                    $("#address").suggestions({
                        token: "02b611f77b1856bdf4f97fe52afe0ba0960330ba",
                        type: "ADDRESS",
                        onSelect: s => { customerData.address = s.value; document.getElementById('addressError').classList.remove('visible'); }
                    });
                }
            } else if (s === 'review' && reviewScreen) reviewScreen.classList.add('active');
            else if (s === 'confirm' && confirmScreen) confirmScreen.classList.add('active');
        }

        function isTeamComplete() { return fieldPositions.size === 11; }
        function updateOrderButtonVisibility() { if (orderButton) orderButton.style.display = isTeamComplete() ? 'inline-block' : 'none'; }
        
        function validatePhone() { const ok = iti?.isValidNumber(); const el = document.getElementById('phoneError'); if (el) el.classList.toggle('visible', !ok); return ok; }
        function validateSurname() { const ok = document.getElementById('surname').value.trim().length >= 2; const el = document.getElementById('surnameError'); if (el) el.classList.toggle('visible', !ok); return ok; }
        function validateName() { const ok = document.getElementById('name').value.trim().length >= 2; const el = document.getElementById('nameError'); if (el) el.classList.toggle('visible', !ok); return ok; }
        function validateAddress() { const ok = document.getElementById('address').value.trim().length >= 5; const el = document.getElementById('addressError'); if (el) el.classList.toggle('visible', !ok); return ok; }

        async function loadTeamData() {
            try {
                const response = await fetch(team.toLowerCase() + '.json');
                if (!response.ok) throw new Error('Файл не найден');
                playersData = await response.json();
                console.log('Загружено игроков:', playersData.length);
                initApp();
            } catch(e) { console.error(e); }
        }

        function initApp() {
            positions.forEach(pos => pos.addEventListener('click', () => openSelector(pos)));
            if (closeSelector) closeSelector.addEventListener('click', closePanel);
            if (clearButton) clearButton.addEventListener('click', clearField);
            if (orderButton) orderButton.addEventListener('click', () => { if (isTeamComplete()) showScreen('form'); });
            if (backFromForm) backFromForm.addEventListener('click', () => showScreen('constructor'));
            if (backToConstructor) backToConstructor.addEventListener('click', () => showScreen('constructor'));
            if (backToForm) backToForm.addEventListener('click', () => showScreen('form'));
            if (finishButton) finishButton.addEventListener('click', () => Telegram.WebApp.close());
            if (editOrder) editOrder.addEventListener('click', () => showScreen('form'));
            if (confirmOrder) confirmOrder.addEventListener('click', async () => {
                if (Telegram.WebApp.platform === 'web') { alert('Только в приложении Telegram'); Telegram.WebApp.close(); return; }
                const success = await startPayment(calculateOrderTotal(), customerData.order_id);
                if (success) { alert('Оплата прошла успешно!'); Telegram.WebApp.close(); }
                else alert('Оплата не завершена');
            });
            if (backToFormFromReview) backToFormFromReview.addEventListener('click', () => showScreen('form'));
            if (nextToConfirm) nextToConfirm.addEventListener('click', () => {
                if (!validateSurname() || !validateName() || !validatePhone() || !validateAddress()) return;
                customerData.surname = document.getElementById('surname').value.trim();
                customerData.name = document.getElementById('name').value.trim();
                customerData.patronymic = document.getElementById('patronymic').value.trim();
                customerData.phone = iti.getNumber();
                customerData.address = document.getElementById('address').value.trim();
                customerData.order_id = Math.floor(Math.random() * 9900) + 100;
                showReviewScreen();
            });
            window.addEventListener('click', (e) => { if (selectorPanel && !selectorPanel.contains(e.target) && !e.target.classList.contains('position')) closePanel(); });
            updateOrderButtonVisibility();
        }

        function openSelector(el) {
            const type = el.dataset.position;
            const rusPos = { GK:'ВРТ', DEF:'ЗАЩ', MID:'ПЗЩ', FWD:'НАП' }[type];
            const names = { GK:'вратаря', DEF:'защитника', MID:'полузащитника', FWD:'нападающего' };
            selectorTitle.textContent = `Выберите ${names[type]}`;
            
            const occupied = new Set();
            for (let [pos, name] of fieldPositions.entries()) if (pos !== el) occupied.add(name);
            
            const free = playersData.filter(p => !occupied.has(p.name));
            const same = free.filter(p => p.position === rusPos);
            const other = free.filter(p => p.position !== rusPos && p.position !== 'ВРТ');
            
            playersList.innerHTML = '';
            same.forEach(p => playersList.appendChild(createPlayerOption(p)));
            if (same.length && other.length) {
                const sep = document.createElement('div'); sep.className = 'separator'; sep.textContent = 'Другие позиции';
                playersList.appendChild(sep);
            }
            other.forEach(p => playersList.appendChild(createPlayerOption(p)));
            
            currentPositionElement = el;
            selectorPanel.classList.add('active');
        }

        function createPlayerOption(p) {
            const div = document.createElement('div'); div.className = 'player-option';
            const img = document.createElement('img');
            img.src = p.variants[0]?.image?.replace(/\\/g, '/') || '';
            img.alt = p.name;
            img.onerror = () => { img.style.display = 'none'; div.style.backgroundColor = '#d3d3d3'; };
            const span = document.createElement('span'); span.className = 'player-name'; span.textContent = p.name;
            div.appendChild(img); div.appendChild(span);
            div.addEventListener('click', () => selectPlayer(p.name, currentPositionElement));
            return div;
        }

        function selectPlayer(name, posEl) {
            if (fieldPositions.has(posEl)) fieldPositions.delete(posEl);
            fieldPositions.set(posEl, name);
            updatePositionDisplay(posEl, name);
            updateOrderButtonVisibility();
            closePanel();
        }

        function updatePositionDisplay(posEl, name) {
            const player = playersData.find(p => p.name === name);
            if (!player) return;
            const imgSrc = player.variants[0]?.image?.replace(/\\/g, '/') || '';
            const oldImg = posEl.querySelector('img'); if (oldImg) oldImg.remove();
            const oldName = posEl.querySelector('.player-name'); if (oldName) oldName.remove();
            const img = document.createElement('img'); img.src = imgSrc; img.alt = name;
            const span = document.createElement('span'); span.className = 'player-name'; span.textContent = name;
            posEl.appendChild(img); posEl.appendChild(span);
            posEl.classList.add('filled');
        }

        function closePanel() { selectorPanel.classList.remove('active'); currentPositionElement = null; }
        
        function clearField() {
            positions.forEach(pos => {
                const img = pos.querySelector('img'); if (img) img.remove();
                const span = pos.querySelector('.player-name'); if (span) span.remove();
                pos.classList.remove('filled');
                fieldPositions.delete(pos);
            });
            updateOrderButtonVisibility();
            closePanel();
        }

        loadTeamData();
    })();
</script>
</body>
</html>
